<!doctype html>
<html lang="pt-BR">
        <head>
                <link rel="stylesheet" href="/pacman-theme.css">
                <meta charset="utf-8" />
                <link rel="icon" type="image/png" href="/static/favicon.png" crossorigin="use-credentials" />
                <link rel="manifest" href="/manifest.json" crossorigin="use-credentials" />
                <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover, interactive-widget=resizes-content" />
                <meta name="theme-color" content="#171717" />
                <meta name="robots" content="noindex,nofollow" />
                <script src="/static/loader.js" defer crossorigin="use-credentials"></script>
                <script>
                        (() => {
                                const theme = localStorage.theme || 'dark';
                                document.documentElement.classList.add(theme === 'system' ? (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light') : theme);
                        })();
                </script>
                <title>Miriam AI</title>
                <!-- Existing chunks will be injected here by the real app -->
                <link href="/_app/immutable/assets/0.D57wautc.css" rel="stylesheet">
        </head>
        <body class="pacman-tech-theme">
                <canvas id="pacman-background" style="position:fixed; top:0; left:0; width:100%; height:100%; z-index:-100;"></canvas>
                
                <div id="splash-screen" style="position: fixed; z-index: 10000; top: 0; left: 0; width: 100%; height: 100%; background: #0b1020;">
                    <canvas id="splash-canvas"></canvas>
                </div>

                <div id="svelte"></div>

                <script src="/pacman-bg.js" defer></script>
                <script src="/splash-anim.js" defer></script>
                
                <!-- This script removes the splash when the app is ready -->
                <script>
                    window.addEventListener('load', () => {
                        setTimeout(() => {
                            const splash = document.getElementById('splash-screen');
                            if (splash) {
                                splash.style.opacity = '0';
                                splash.style.transition = 'opacity 0.5s ease-out';
                                setTimeout(() => splash.remove(), 500);
                            }
                        }, 2000); // Give it a moment to show the cool anim
                    });
                </script>
        </body>
</html>
